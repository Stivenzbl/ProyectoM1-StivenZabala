<!DOCTYPE html>
<html lang="es">

  <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- mi css -->
     <link rel="stylesheet" href="./css/styles.css">  
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

     <title>Colorfly Studio</title>
  </head>

  <body>

    <header class="Encabezado Encabezado--principal">  

      <nav class="nav">
        <span class="nav__logo" >Colorfly Studio</span>
        <ul class="nav__links"> 
          <li><a class="nav__link" href="#Guardadas">Guardadas</a></li>
          <li><a class="nav__link" href="#Generador">Generador</a></li>
        </ul>
      </nav> 
    </header>

    <!-- Contenido principal del generador -->
    
    <main>
      <section id="Generador">
        <h2 class="generador1"> Generar paleta</h2>
      </section> 

      <section class="galeria">
          
         <article class="swatch"> 
          <div class="swatch__color swatch__color--primario"></div>
          <div class="swatch__info">
            <p class="swatch__nombre">primario</p>
            <p class="swatch__codigo"> #ec3a8D  hsl(330, 85%, 55%)</p>
          </div>
        </article>

        <article class="swatch"> 
          <div class="swatch__color swatch__color--claro"></div>
          <div class="swatch__info">
             <p class="swatch__nombre">primario claro</p>
             <p class="swatch__codigo">#f47bb8 hsl(330, 85%, 72%)</p>
           </div>
        </article>  

        <article class="swatch"> 
          <div class="swatch__color swatch__color--oscuro"></div>
          <div class="swatch__info">
            <p class="swatch__nombre">primario oscuro</p>
            <p class="swatch__codigo"> #b31966 hsl(330, 75%, 40%)</p>
          </div>
        </article>
         
        <article class="swatch"> 
          <div class="swatch__color swatch__color--acento"></div>
          <div class="swatch__info">
            <p class="swatch__nombre">acento</p>
            <p class="swatch__codigo">#00ffff hsl(180, 100%, 50%)</p>
          </div>
        </article>
      </section>

    </main>
    
  </body>

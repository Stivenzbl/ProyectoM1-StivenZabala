<!DOCTYPE html>
<html lang="es">

  <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- mi css -->
     <link rel="stylesheet" href="./css/styles.css">  
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

     <title>Colorfly Studio</title>
  </head>

  <body>

    <header class="Encabezado Encabezado--principal">  

      <nav class="nav">
        <span class="nav__logo" >Colorfly Studio</span>
        <ul class="nav__links"> 
          <li><a class="nav__link" href="#Generador">Generador</a></li>
        </ul>
      </nav> 
    </header>

    <!-- Contenido principal del generador -->
    
    <main>
      <section id="Generador">
        <h2> Generar paleta</h2>

        <!-- nuevo boton: dispara la generacion -->
         <div class="controles"> 
          <button class="boton boton--primario" id="generar">Generar Paleta</button>
          <div class="controles__campo">
            <label class="controles__label" for="cantidad">Cantidad de colores</label>
            <select class="select" id="cantidad">
              <option value = "6">6</option>
              <option value = "8">8</option>
              <option value = "9">9</option>
            </select>
          </div>
         </div>

        <section class="galeria" id="galeria"></section> 
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Paleta de Colores. Todos los derechos reservados.</p>
    </footer>

    <script src="./js/index.js"></script>
    
  </body>
        



</html>
